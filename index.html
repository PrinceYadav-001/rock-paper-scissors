<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <link href = "style.css" rel = "stylesheet">
    <script src = "script.js" defer></script>
</head>
<body>
    <div class = "master-div">
        <div class = "play-area">
            <div class = "player-display"><img src = "images/rock.svg"></div>
            <div class = "computer-display"><img src = "images/rock.svg"></div>
        </div>

        <div id = "score-txt">
            <div>Your Score: <span id = "your-score">0</span></div>
            <div>Bot Score: <span id = "comp-score">0</span></div>
        </div>
        
        <div class = "controls">
            <button id = "rock-btn" class = "play-btn">ROCK</button>
            <button id = "paper-btn" class = "play-btn">PAPER</button>
            <button id = "scissors-btn" class = "play-btn">SCISSORS</button>
        </div>

        <div id = "outcome-txt"></div>
    </div>
</body>
</html>
